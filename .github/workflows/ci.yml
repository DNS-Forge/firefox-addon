name: Run Extension Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Run Jest tests
      run: |
        npm install --save-dev jest jest-environment-jsdom jest-fetch-mock jest-webextension-mock @testing-library/dom @testing-library/jest-dom
        npx jest --ci
